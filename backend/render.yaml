# Render blueprint — DBR Compliance Checker backend + Postgres.
# Create via Render dashboard "New > Blueprint" pointing at this repo, or deploy
# the web service manually and attach the database.
services:
  - type: web
    name: dbr-checker-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python scripts/repair_corpus.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false           # set in dashboard (secret)
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4.6
      - key: CORS_ORIGINS
        sync: false           # set to your Vercel URL
      - key: ADMIN_PASSCODE
        sync: false           # secret for the /admin dashboard
      - key: ADMIN_EMAIL
        value: aiplanner04@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: dbr-checker-db
          property: connectionString

databases:
  - name: dbr-checker-db
    plan: free
